name: CI -  Wite Web LTcoaching

# déclenchement quand ont push sur master
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# git lance une machine linux
jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # étapes
    steps:
      # récupére mon code
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit vulnerabilities
        run: npm audit --production --audit-level=high || true
        # Le "|| true" empêche l'échec du job si des vulnérabilités sont trouvées

      - name: Check TypeScript types
        run: npm run check:types

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format

      - name: Run Jest tests
        run: npm run test

      - name: Build project
        run: npm run build
