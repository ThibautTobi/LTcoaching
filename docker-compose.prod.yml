version: "3.8"
# image construite stable et optimisé en Prod , bild figé pas de hot reload comme en Dev.
services:
  app:
    container_name: lt-coaching-app
  # construction de l'image a partir du fichier Dockerfile.
    build:
    # utilise le projet actuel
      context: .
      dockerfile: Dockerfile

  # utilisation : http://localhost:3000
    ports:
      - "3000:3000"

    # Variables d'environnement ( comme en Dev via .env)
    environment:
    # met en mode Prod
      - NODE_ENV=production
      - NEXT_PUBLIC_EMAILJS_SERVICE_ID=${NEXT_PUBLIC_EMAILJS_SERVICE_ID}
      - NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
  # redemarre automatiquement si sa plante, crash, erreur, reboot machine.
    restart: always